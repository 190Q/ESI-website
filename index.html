<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empire of Sindria dashboard</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <style id="esi-prepaint-hide">
    html.theme-preload body { opacity: 0 !important; }
  </style>
  <script>
    (function () {
      try {
        var storedTheme = String(localStorage.getItem('theme') || '').trim();
        if (storedTheme && storedTheme !== 'custom') {
          document.documentElement.classList.add('theme-preload');
        }
      } catch (_err) {}
    })();
  </script>
  <script src="/js/theme-config.js?v=20260601b"></script>
  <script>
    if (window.ThemeConfig && typeof window.ThemeConfig.applyInitialTheme === 'function') {
      window.ThemeConfig.applyInitialTheme();
    }
  </script>
  <script src="/js/font-config.js?v=20260601b"></script>
  <script>
    if (window.FontConfig && typeof window.FontConfig.applyInitialFont === 'function') {
      window.FontConfig.applyInitialFont();
    }
  </script>
  <script src="/js/theme-images.js"></script>
  <script src="/js/theme-patterns.js"></script>
  <script type="module" crossorigin src="/assets/index-D4HdxfRC.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-BfOna_rI.css">
</head>
<body>
  <script>
    document.documentElement.classList.add('no-transitions');
    if (localStorage.getItem('sidebarCollapsed') === 'true') {
      document.documentElement.classList.add('sidebar-pre-collapsed');
    }
    // Pre-paint: inject CSS overrides so React defaults don't flash
    (function() {
      // Always show the login button immediately (React sets opacity:0)
      var btnS = document.createElement('style');
      btnS.id = 'esi-preload-btn';
      btnS.textContent = '#loginBtn{opacity:1!important}';
      document.head.appendChild(btnS);
      // Panel: always match the URL so the player page doesn't flash
      var css = '';
      var p = location.pathname.replace(/^\//, '').split('/');
      var f = p[0] || 'player';
      var panel = f;
      if (f === 'events' && p[1] === 'manage') panel = 'events-manage';
      if (f === 'shop' && p[1] === 'admin') panel = 'shop-admin';
      if (f === 'shop' && p[1] === 'studio') panel = 'creator-studio';
      if (f === 'guild' && p[1] === 'info') panel = 'guild-info';
      if (panel !== 'player') {
        css += '#panel-player.panel.active{display:none!important}';
        css += '#panel-' + panel + '.panel{display:block!important;flex:1!important}';
        css += '[data-panel="player"].nav-item.active{color:var(--text-dim,#8faa90)!important;background:transparent!important;border-color:transparent!important}';
        css += '[data-panel="player"].nav-item.active::before{display:none!important}';
        css += '[data-panel="' + panel + '"].nav-item{color:var(--gold-light,#F0C040)!important;background:rgba(var(--gold-rgb,212,160,23),0.12)!important;border-color:rgba(var(--gold-rgb,212,160,23),0.35)!important}';
      }
      var hideNavbarCenter = false;
      try {
        hideNavbarCenter = localStorage.getItem('esi_navbar_hide_center') === '1';
      } catch (_err) {}
      if (hideNavbarCenter) {
        css += '.navbar .navbar-center{display:none!important}';
        css += '.navbar .navbar-right{margin-left:auto!important;flex:0 1 auto!important;max-width:none!important}';
      }
      // Auth-specific overrides (logged-in button + nav items)
      var u = localStorage.getItem('esi_user');
      if (u) {
        var cached;
        try { cached = JSON.parse(u); } catch(e) { cached = null; }
        if (cached) {
          // Upgrade button CSS: collapse content until MutationObserver fills it
          btnS.textContent = '#loginBtn{opacity:1!important;background:var(--online,#3BA55C)!important;box-shadow:0 2px 12px rgba(var(--online-rgb,59,165,92),0.35)!important;font-size:0!important;line-height:0!important}#loginBtn svg{display:none!important}';
          // Fill login button the instant React mounts it (before first paint)
          var avatarUrl = cached.avatar
            ? 'https://cdn.discordapp.com/avatars/' + cached.id + '/' + cached.avatar + '.png?size=64'
            : 'https://cdn.discordapp.com/embed/avatars/0.png';
          var displayName = cached.nick || cached.username || '';
          var obs = new MutationObserver(function() {
            var btn = document.getElementById('loginBtn');
            if (!btn) return;
            obs.disconnect();
            var el = document.getElementById('esi-preload-btn');
            if (el) el.remove();
            btn.textContent = '';
            var img = document.createElement('img');
            img.src = avatarUrl;
            img.alt = '';
            img.style.cssText = 'width:20px;height:20px;border-radius:50%;object-fit:cover;flex-shrink:0;';
            btn.appendChild(img);
            var label = document.createElement('span');
            label.className = 'btn-label';
            label.textContent = displayName;
            btn.appendChild(label);
            btn.style.opacity = '1';
            btn.style.background = 'var(--online,#3BA55C)';
            btn.style.boxShadow = '0 2px 12px rgba(var(--online-rgb,59,165,92),0.35)';
            btn.classList.add('btn-discord--account');
          });
          obs.observe(document.documentElement, { childList: true, subtree: true });
          // Nav visibility from last-known state
          var nc = localStorage.getItem('esi_nav_cache');
          if (nc) {
            try {
              var n = JSON.parse(nc);
              if (n.shop) css += '#shopNavItem{display:list-item!important}';
              if (n.creatorStudio) css += '#creatorStudioNavItem{display:list-item!important}';
              if (n.shopAdmin) css += '#shopAdminNavItem{display:list-item!important}';
              if (n.guildInfo) css += '#guildInfoNavItem{display:list-item!important}';
              if (n.manage) {
                css += '#manageSection{display:block!important}';
                if (!n.inactivity) css += '#manageSection li:has([data-panel="inactivity"]){display:none!important}';
                if (!n.promotions) css += '#manageSection li:has([data-panel="promotions"]){display:none!important}';
                if (!n.eventsManage) css += '#manageSection li:has([data-panel="events-manage"]){display:none!important}';
              }
            } catch(e) {}
          }
        }
      }
      if (css) {
        var s = document.createElement('style');
        s.id = 'esi-preload-css';
        s.textContent = css;
        document.head.appendChild(s);
      }
      // Pre-paint: apply icon-only mode for player lookup button when text would overflow.
      var searchPrepaintStyle = document.createElement('style');
      searchPrepaintStyle.id = 'esi-preload-player-search';
      searchPrepaintStyle.textContent =
        '#searchPlayerBtn .btn-search-icon{' +
          'width:16px!important;' +
          'height:16px!important;' +
          'flex:0 0 auto!important;' +
        '}' +
        '#searchPlayerBtn.icon-only{' +
          'display:inline-flex!important;' +
          'align-items:center!important;' +
          'justify-content:center!important;' +
          'gap:0!important;' +
          'flex:0 0 42px!important;' +
          'width:42px!important;' +
          'min-width:42px!important;' +
          'max-width:42px!important;' +
          'padding:10px 0!important;' +
          'font-size:0.95rem!important;' +
          'letter-spacing:0!important;' +
        '}' +
        '#searchPlayerBtn.icon-only .btn-search-text{' +
          'display:none!important;' +
        '}';
      document.head.appendChild(searchPrepaintStyle);
      function buildPrepaintSearchIconSvg() {
        var ns = 'http://www.w3.org/2000/svg';
        var svg = document.createElementNS(ns, 'svg');
        svg.setAttribute('class', 'btn-search-icon');
        svg.setAttribute('viewBox', '0 0 24 24');
        svg.setAttribute('fill', 'none');
        svg.setAttribute('xmlns', ns);
        svg.setAttribute('aria-hidden', 'true');
        svg.setAttribute('focusable', 'false');
        var path = document.createElementNS(ns, 'path');
        path.setAttribute('d', 'M15.7955 15.8111L21 21M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z');
        path.setAttribute('stroke', '#000000');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('stroke-linecap', 'round');
        path.setAttribute('stroke-linejoin', 'round');
        svg.appendChild(path);
        return svg;
      }

      function ensurePrepaintSearchButtonStructure(btn) {
        if (!btn) return null;
        var icon = btn.querySelector('.btn-search-icon');
        var label = btn.querySelector('.btn-search-text');
        if (icon && label) return { icon: icon, label: label };
        var fallbackText = '';
        if (label && label.textContent) fallbackText = label.textContent.trim();
        if (!fallbackText) fallbackText = (btn.textContent || '').replace(/\s+/g, ' ').trim();
        btn.textContent = '';
        icon = icon || buildPrepaintSearchIconSvg();
        label = label || document.createElement('span');
        label.className = 'btn-search-text';
        if (!label.textContent || !label.textContent.trim()) {
          label.textContent = fallbackText || 'Look Up';
        }
        btn.appendChild(icon);
        btn.appendChild(label);
        return { icon: icon, label: label };
      }

      function applyPrepaintPlayerSearchCompact() {
        var wrap = document.querySelector('.player-search-wrap');
        var btn = document.getElementById('searchPlayerBtn');
        if (!wrap || !btn) return false;
        var refs = ensurePrepaintSearchButtonStructure(btn);
        if (!refs) return false;
        if (!refs.label.textContent || !refs.label.textContent.trim()) {
          refs.label.textContent = 'Look Up';
        }
        btn.classList.remove('icon-only');
        refs.label.style.display = '';
        var needsCompact = (wrap.scrollWidth - wrap.clientWidth) > 1 || (btn.scrollWidth - btn.clientWidth) > 1;
        btn.classList.toggle('icon-only', needsCompact);
        refs.label.style.display = needsCompact ? 'none' : '';
        return true;
      }

      function initPrepaintPlayerSearchCompact() {
        if (applyPrepaintPlayerSearchCompact()) {
          setTimeout(applyPrepaintPlayerSearchCompact, 0);
          if (document.fonts && document.fonts.ready && typeof document.fonts.ready.then === 'function') {
            document.fonts.ready.then(applyPrepaintPlayerSearchCompact).catch(function () {});
          }
          return;
        }
        var searchObs = new MutationObserver(function () {
          if (!applyPrepaintPlayerSearchCompact()) return;
          searchObs.disconnect();
          setTimeout(applyPrepaintPlayerSearchCompact, 0);
          if (document.fonts && document.fonts.ready && typeof document.fonts.ready.then === 'function') {
            document.fonts.ready.then(applyPrepaintPlayerSearchCompact).catch(function () {});
          }
        });
        searchObs.observe(document.documentElement, { childList: true, subtree: true });
      }
      initPrepaintPlayerSearchCompact();
    })();
  </script>
  <div id="root"></div>
</body>
</html>
