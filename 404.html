<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found</title>
  <script src="/js/theme-config.js"></script>
  <script src="/js/font-config.js"></script>
  <script src="/js/404-preferences.js"></script>
  <link rel="stylesheet" href="/css/fonts.css" />
  <link rel="stylesheet" href="/css/themes.css" />
  <style>
    html, body {
      height: 100%;
    }
    h1 {
      margin: 0 0 0.75rem;
      font-family: var(--font-heading);
      font-size: clamp(2rem, 2vw + 1rem, 2.8rem);
      color: var(--gold-light);
      letter-spacing: 0.01em;
    }
    p {
      margin: 0 0 1.5rem;
      font-size: 1.15rem;
      color: var(--text-dim);
      line-height: 1.5;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 2rem;
      font-family: var(--font-body);
      color: var(--text-main);
      background: var(--parchment);
      display: grid;
      place-items: center;
    }
    .content {
      text-align: center;
      max-width: 60ch;
    }
    .code {
      margin: 0 0 1rem;
      font-family: var(--font-heading);
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: var(--gold);
    }
    .home-link {
      font-family: var(--font-heading);
      font-size: 1.05rem;
      color: var(--gold-light);
      text-underline-offset: 0.2em;
    }
    .home-link:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>
  <main class="content" aria-labelledby="not-found-title">
    <p class="code">404</p>
    <h1 id="not-found-title">Page not found</h1>
    <p>The link you opened does not exist on this site.</p>
    <a class="home-link" href="/">Back to dashboard</a>
  </main>
</body>
</html>
